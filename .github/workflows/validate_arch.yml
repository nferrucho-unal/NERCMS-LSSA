name: Validate Architecture
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-arch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install textX

      - name: Build and Validate System of Systems Model
        run: python build_model.py
